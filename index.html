<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE/ESE Prep Tracker</title>
<style>
/* =========================================================
   CSS VARIABLES — LIGHT & DARK THEMES
   ========================================================= */
:root {
  --bg:         #f0f2f7;
  --surface:    #ffffff;
  --surface2:   #f5f7fb;
  --surface3:   #e8ecf4;
  --text:       #1a1d2e;
  --text2:      #5a6175;
  --text3:      #8892a4;
  --border:     #dde2ef;
  --primary:    #4f46e5;
  --primary2:   #6d63f0;
  --primary-bg: #eeedfb;
  --success:    #059669;
  --success-bg: #d1fae5;
  --warning:    #d97706;
  --warning-bg: #fef3c7;
  --danger:     #dc2626;
  --danger-bg:  #fee2e2;
  --info:       #0284c7;
  --info-bg:    #e0f2fe;
  --sidebar:    #1e1b4b;
  --sidebar2:   #16134a;
  --sidebar-txt:#c7d2fe;
  --sidebar-act:#4f46e5;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
  --shadow:     0 4px 12px rgba(0,0,0,.10);
  --shadow-lg:  0 12px 40px rgba(0,0,0,.15);
  --radius:     12px;
  --radius-sm:  8px;
}
[data-theme="dark"] {
  --bg:         #0b0c18;
  --surface:    #13142a;
  --surface2:   #1a1c35;
  --surface3:   #22254a;
  --text:       #e2e6f8;
  --text2:      #8892c4;
  --text3:      #5a6490;
  --border:     #2a2d55;
  --primary:    #818cf8;
  --primary2:   #a5b4fc;
  --primary-bg: #1e1b4b;
  --success:    #34d399;
  --success-bg: #064e3b;
  --warning:    #fbbf24;
  --warning-bg: #451a03;
  --danger:     #f87171;
  --danger-bg:  #450a0a;
  --info:       #38bdf8;
  --info-bg:    #0c4a6e;
  --sidebar:    #080918;
  --sidebar2:   #0d0e24;
  --sidebar-txt:#a5b4fc;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.3);
  --shadow:     0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:  0 12px 40px rgba(0,0,0,.6);
}

/* =========================================================
   RESET & BASE
   ========================================================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hidden{display:none!important}

/* =========================================================
   SIDEBAR
   ========================================================= */
#sidebar{
  width:220px;background:var(--sidebar);flex-shrink:0;
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s ease;z-index:50;
}
#sidebar.collapsed{width:58px}
#sidebar.collapsed .nav-label{opacity:0;width:0;overflow:hidden}
#sidebar.collapsed .sidebar-brand-text{display:none}
.sidebar-header{
  padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.sidebar-brand-icon{font-size:22px;flex-shrink:0}
.sidebar-brand-text{font-weight:700;font-size:13px;color:#e0e7ff;white-space:nowrap;letter-spacing:.4px}
.sidebar-brand-sub{font-size:10px;color:var(--sidebar-txt);opacity:.7;display:block;margin-top:1px}
#nav-links{flex:1;overflow-y:auto;padding:8px 0}
.nav-section-label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  color:rgba(167,179,255,.4);padding:10px 16px 4px;text-transform:uppercase
}
#sidebar.collapsed .nav-section-label{display:none}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;
  border-left:3px solid transparent;transition:all .18s;
  color:var(--sidebar-txt);font-size:13px;user-select:none;
  border-radius:0 8px 8px 0;margin:1px 8px 1px 0;
}
.nav-item:hover{background:rgba(255,255,255,.07)}
.nav-item.active{background:rgba(79,70,229,.35);border-left-color:var(--primary);color:#fff;font-weight:600}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-label{white-space:nowrap;transition:opacity .2s,width .2s}
.sidebar-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.07);display:flex;gap:8px;align-items:center}

/* =========================================================
   MAIN AREA
   ========================================================= */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 18px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow-sm);flex-shrink:0;z-index:40;
}
#topbar-title{font-weight:700;font-size:15px;flex:1;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:8px}
#content{flex:1;overflow-y:auto;padding:20px}
.section-page{display:none}
.section-page.active{display:block}

/* =========================================================
   CARDS & LAYOUT
   ========================================================= */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.card+.card{margin-top:14px}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* Stat cards */
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-align:center;box-shadow:var(--shadow-sm);
  transition:transform .18s,box-shadow .18s;cursor:default;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-num{font-size:34px;font-weight:800;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:6px;font-weight:500}
.stat-icon{font-size:22px;margin-bottom:6px}

/* =========================================================
   FORM ELEMENTS
   ========================================================= */
input[type=text],input[type=date],input[type=number],textarea,select{
  width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;transition:border-color .18s,box-shadow .18s;
}
input[type=text]:focus,input[type=date]:focus,textarea:focus,select:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.12);
}
textarea{resize:vertical;min-height:70px;line-height:1.6}
label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.form-group{margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
.input-with-voice{display:flex;gap:6px;align-items:flex-start}
.input-with-voice textarea,.input-with-voice input{flex:1}

/* =========================================================
   BUTTONS
   ========================================================= */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-size:13px;font-weight:600;transition:all .18s;white-space:nowrap;
  font-family:inherit;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface3)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:6px;width:32px;height:32px;border-radius:6px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}

/* =========================================================
   TAGS
   ========================================================= */
.tag{
  display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;user-select:none;
  border:1.5px solid transparent;transition:all .15s;
}
.tag-imp{background:#fef3c7;color:#92400e;border-color:#fde68a}
.tag-weak{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.tag-concept{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.tag-calc{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.tag-rev{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
[data-theme="dark"] .tag-imp{background:#451a03;color:#fde68a;border-color:#92400e}
[data-theme="dark"] .tag-weak{background:#450a0a;color:#fca5a5;border-color:#991b1b}
[data-theme="dark"] .tag-concept{background:#1e3a8a;color:#93c5fd;border-color:#1d4ed8}
[data-theme="dark"] .tag-calc{background:#064e3b;color:#6ee7b7;border-color:#059669}
[data-theme="dark"] .tag-rev{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
.tag.active,.tag.selected{box-shadow:0 0 0 2px var(--primary);transform:scale(1.05)}
.tags-row{display:flex;flex-wrap:wrap;gap:5px}

/* =========================================================
   BADGES & STATUS
   ========================================================= */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-warning{background:var(--warning-bg);color:var(--warning)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-neutral{background:var(--surface3);color:var(--text2)}

/* =========================================================
   PROGRESS BARS
   ========================================================= */
.progress-bar{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .6s ease}
.progress-fill.success{background:var(--success)}
.progress-fill.warning{background:var(--warning)}
.progress-fill.danger{background:var(--danger)}

/* =========================================================
   TABS
   ========================================================= */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:0}
.tab-btn{
  padding:9px 20px;border:none;background:none;cursor:pointer;font-size:13px;
  color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:all .18s;font-weight:500;font-family:inherit;
}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.tab-btn:hover:not(.active){color:var(--text)}

/* =========================================================
   LIST ITEMS
   ========================================================= */
.list-item{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;transition:border-color .15s,box-shadow .15s;
  cursor:pointer;
}
.list-item:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.list-item.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,70,229,.15)}

/* =========================================================
   MODAL
   ========================================================= */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:var(--radius);padding:24px;
  width:90%;max-width:600px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:slideUp .2s ease;
}
.modal-sm{max-width:380px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--surface3)}

/* =========================================================
   TOAST
   ========================================================= */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:13px;font-weight:600;color:var(--text);
  box-shadow:var(--shadow-lg);z-index:9999;opacity:0;
  transition:all .3s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--success);color:var(--success)}
#toast.error{border-color:var(--danger);color:var(--danger)}

/* =========================================================
   VOICE BUTTON
   ========================================================= */
.voice-btn{
  padding:7px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;font-size:15px;flex-shrink:0;
  transition:all .18s;
}
.voice-btn:hover{border-color:var(--primary)}
.voice-btn.recording{background:var(--danger);color:#fff;border-color:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* =========================================================
   IMAGE PREVIEW
   ========================================================= */
.img-preview-wrap{position:relative;display:inline-block}
.img-preview{max-width:160px;max-height:120px;border-radius:8px;border:1px solid var(--border);object-fit:cover;cursor:zoom-in}
.img-remove-btn{
  position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;
  border:none;border-radius:50%;width:18px;height:18px;font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* =========================================================
   SPLIT LAYOUT (list + detail)
   ========================================================= */
.split-layout{display:flex;gap:16px;height:calc(100vh - 130px)}
.split-list{width:300px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.split-detail{flex:1;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.split-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.split-empty-icon{font-size:52px}

/* =========================================================
   FOLDER TREE
   ========================================================= */
.folder-node{font-size:13px}
.folder-row{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;
  cursor:pointer;transition:background .15s;color:var(--text);
}
.folder-row:hover{background:var(--surface2)}
.folder-row.active{background:var(--primary-bg);color:var(--primary);font-weight:600}
/* Three-dot button used on list items */
.three-dot-btn{
  position:absolute;top:8px;right:8px;
  background:none;border:1px solid transparent;border-radius:6px;
  cursor:pointer;color:var(--text3);font-size:17px;line-height:1;
  padding:2px 6px;z-index:10;transition:all .15s;
}
.three-dot-btn:hover{background:var(--surface3);border-color:var(--border);color:var(--text);}
.folder-children{padding-left:18px}
.folder-toggle{font-size:11px;width:14px;flex-shrink:0;text-align:center;color:var(--text3)}

/* =========================================================
   ROUTINE TABLE
   ========================================================= */
.routine-wrap{overflow-x:auto}
.routine-table{border-collapse:collapse;width:100%;min-width:500px}
.routine-table th,.routine-table td{border:1px solid var(--border);padding:6px 8px;vertical-align:top}
.routine-table th{background:var(--surface2);font-weight:700;font-size:12px;white-space:nowrap}
.routine-table td input[type=text]{border:none;background:transparent;padding:3px;font-size:12px;min-width:90px}
.routine-table td input[type=checkbox]{width:auto}
.cell-inner{display:flex;align-items:flex-start;gap:5px}

/* =========================================================
   SEARCH ROW
   ========================================================= */
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-row input,.search-row select{flex:1;min-width:140px}
.search-row select{flex:0;min-width:120px}

/* =========================================================
   MISC
   ========================================================= */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:18px;font-weight:800}
.divider{height:1px;background:var(--border);margin:14px 0}
.text-muted{color:var(--text2);font-size:12px}
.text-sm{font-size:12px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.fw-700{font-weight:700}
.color-danger{color:var(--danger)}
.color-success{color:var(--success)}
.color-warning{color:var(--warning)}
.color-primary{color:var(--primary)}
</style>
</head>

  </div>

<div id="toast"></div>

<script>
/* ============================================================
   DATABASE — IndexedDB
   ============================================================ */
const DB_NAME = 'GatePrepDB_v1';
const DB_VER  = 3;
const S = { DIARY:'diary', TEST:'testAnalysis', REVISION:'revision', ROUTINE:'routine', FOLDERS:'folders', SETTINGS:'settings' };
let db;

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onerror = () => rej(r.error);
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onupgradeneeded = e => {
      const d = e.target.result;
      /* Safe helper — skips if store already exists */
      const make = (name, ...indices) => {
        if (d.objectStoreNames.contains(name)) return;
        const st = d.createObjectStore(name, { keyPath:'id' });
        indices.forEach(([k,u]) => st.createIndex(k, k, { unique:!!u }));
      };
      /* Core stores (v1+) */
      make(S.DIARY,    ['date'], ['subject'], ['topic'], ['folderId']);
      make(S.TEST,     ['date'], ['topic'],   ['subject']);
      make(S.REVISION, ['planType'], ['status']);
      make(S.ROUTINE);
      make(S.FOLDERS,  ['parentId']);
      make(S.SETTINGS);
      /* v3: dedicated appstore for large embedded HTML files */
      make('appstore');
    };
  });
}

const tx = (store, mode='readonly') => db.transaction(store, mode).objectStore(store);

function dbPut(store, data)    { return new Promise((res,rej)=>{const r=tx(store,'readwrite').put(data);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)}); }
function dbGet(store, key)     { return new Promise((res,rej)=>{const r=tx(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)}); }
function dbGetAll(store)       { return new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)}); }
function dbDelete(store, key)  { return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)}); }
function dbClear(store)        { return new Promise((res,rej)=>{const r=tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error)}); }
function dbGetByIndex(store, idx, val) {
  return new Promise((res,rej)=>{
    const r=tx(store).index(idx).getAll(val);
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);
  });
}

const debounceTimers = {};
function debounce(key, fn, ms=700) { clearTimeout(debounceTimers[key]); debounceTimers[key]=setTimeout(fn,ms); }

function fileToBase64(file) {
  return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});
}

/* Returns {name, type:'image'|'pdf', data:base64} or null */
async function fileToRec(file) {
  if (!file) return null;
  const isPDF = file.type==='application/pdf' || file.name?.toLowerCase().endsWith('.pdf');
  const isImg = file.type.startsWith('image/');
  if (!isPDF && !isImg) { showToast('Only images and PDFs are supported','error',2500); return null; }
  const data = await fileToBase64(file);
  return { name:file.name, type:isPDF?'pdf':'image', data };
}

/* Render a file attachment thumbnail (image zoom or PDF open) */
function renderFileThumb(f, fi, removeFnName) {
  if (!f || !f.data) return '';
  if (f.type==='pdf') {

      <button onclick="${removeFnName}(${fi})" class="img-remove-btn" style="position:static;width:16px;height:16px;">×</button>
    </div>`;
  }
  return `<div class="img-preview-wrap">
    <img src="${f.data}" class="img-preview" onclick="viewFileRec(${fi},'${removeFnName}')">
    <button class="img-remove-btn" onclick="${removeFnName}(${fi})">×</button>
  </div>`;

/* Open a stored file record in new tab */
function openFileRec(fi, srcFn) {
  const arr = _getFileArr(srcFn);
  const f = arr[fi]; if (!f?.data) return;
  const byteStr=atob(f.data.split(',')[1]);
  const ab=new ArrayBuffer(byteStr.length);
  const ia=new Uint8Array(ab);
  for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
  const blob=new Blob([ab],{type:'application/pdf'});
  window.open(URL.createObjectURL(blob),'_blank');
}

function viewFileRec(fi, srcFn) {
  const arr=_getFileArr(srcFn); const f=arr[fi]; if(!f?.data) return;
  showModal(`<div class="modal" style="max-width:92vw;text-align:center;">
    <div class="modal-header"><div class="modal-title">🖼 ${esc(f.name||'Image')}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <img src="${f.data}" style="max-width:100%;max-height:75vh;border-radius:8px;">
    <div style="margin-top:8px;"><a href="${f.data}" download="${esc(f.name||'image.png')}" class="btn btn-secondary btn-sm">⬇ Download</a></div>
  </div>`);
}

function _getFileArr(fnName) {
  if (fnName==='removeDFile') return diaryFiles;
  if (fnName==='removeTFile') return testFiles;
  if (fnName==='removeRevFile') return _curRevFiles||[];
  return [];
}

/* ============================================================
   ADVANCED VOICE INPUT ENGINE
   - Works in all browsers supporting Web Speech API
   - Auto-restarts on silence (continuous offline-style)
   - Multi-language support with quick switcher
   - Interim results shown live in textarea
   - Punctuation commands in English + Hindi + common langs
   ============================================================ */
const VOICE_LANGS = [
  {code:'en-IN',label:'English (India)'},
  {code:'en-US',label:'English (US)'},
  {code:'hi-IN',label:'हिंदी'},
  {code:'bn-IN',label:'বাংলা'},
  {code:'te-IN',label:'తెలుగు'},
  {code:'mr-IN',label:'मराठी'},
  {code:'ta-IN',label:'தமிழ்'},
  {code:'gu-IN',label:'ગુજરાતી'},
  {code:'kn-IN',label:'ಕನ್ನಡ'},
  {code:'ml-IN',label:'മലയാളം'},
  {code:'pa-IN',label:'ਪੰਜਾਬੀ'},
  {code:'ur-PK',label:'اردو'},
  {code:'ar-SA',label:'العربية'},
  {code:'fr-FR',label:'Français'},
  {code:'de-DE',label:'Deutsch'},
  {code:'es-ES',label:'Español'},
  {code:'zh-CN',label:'中文'},
  {code:'ja-JP',label:'日本語'},
  {code:'ko-KR',label:'한국어'},
  {code:'ru-RU',label:'Русский'},
];
/* Punctuation commands: spoken word → inserted text */
const PUNCT_MAP = {
  'new line':'\n','नई लाइन':'\n','nayi line':'\n',
  'full stop':'. ','period':'. ','पूर्ण विराम':'. ','dot':'. ',
  'comma':',  ','कॉमा':', ','viral':',  ',
  'question mark':'? ','प्रश्न चिह्न':'? ',
  'exclamation mark':'! ','exclamation':'! ',
  'colon':': ','semicolon':'; ',
  'open bracket':'( ','close bracket':' )',
  'new paragraph':'\n\n','paragraph':'\n\n',
  'delete last':'__DELETE_LAST__',
  'clear all':'__CLEAR__',
};

let recognition=null, activeVoiceEl=null, isRecording=false;
let _voiceLang = localStorage.getItem('voiceLang')||'en-IN';
let _voiceInterim='', _voiceAutoRestart=true, _voiceRestartTimer=null;
let _voiceHasAPI = !!(window.SpeechRecognition||window.webkitSpeechRecognition);

function initVoice() {
  /* Update sidebar lang select to match saved lang */
  const sel=document.getElementById('voice-lang');
  if (sel) { sel.value=_voiceLang; sel.onchange=()=>{ _voiceLang=sel.value; localStorage.setItem('voiceLang',_voiceLang); if(isRecording)voiceRestart(); }; }
  if (!_voiceHasAPI) return;
  _voiceBuild();
}

function _voiceBuild() {
  if (!_voiceHasAPI) return;
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.lang = _voiceLang;

  recognition.onresult = e => {
    if (!activeVoiceEl) return;
    let finalT='', interimT='';
    for (let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i];
      /* pick best alternative with confidence check */
      let best=r[0].transcript;
      if(r.length>1&&r[1].confidence>r[0].confidence) best=r[1].transcript;
      if(r.isFinal) finalT+=best; else interimT+=best;
    }
    /* apply punctuation commands on final text */
    if(finalT.trim()){
      const cmd=finalT.trim().toLowerCase();
      if(PUNCT_MAP[cmd]){
        const action=PUNCT_MAP[cmd];
        if(action==='__DELETE_LAST__'){
          activeVoiceEl._vbase=(activeVoiceEl._vbase||'').replace(/\S+\s*$/,'');
        } else if(action==='__CLEAR__'){
          activeVoiceEl._vbase='';
        } else {
          activeVoiceEl._vbase=(activeVoiceEl._vbase||'')+action;
        }
      } else {
        activeVoiceEl._vbase=(activeVoiceEl._vbase||'')+finalT;
      }
    }
    _voiceInterim=interimT;
    /* show base + interim in textarea */
    activeVoiceEl.value=(activeVoiceEl._vbase||'')+_voiceInterim;
    activeVoiceEl.dispatchEvent(new Event('input'));
    /* scroll to bottom */
    activeVoiceEl.scrollTop=activeVoiceEl.scrollHeight;
    _voiceUpdatePanel(interimT);
  };

  recognition.onend = () => {
    /* auto-restart if still recording (handles silence timeout) */
    if (isRecording && _voiceAutoRestart) {
      clearTimeout(_voiceRestartTimer);
      _voiceRestartTimer=setTimeout(()=>{
        if(!isRecording||!activeVoiceEl) return;
        try{ recognition.lang=_voiceLang; recognition.start(); } catch(ex){}
      },200);
    } else {
      isRecording=false; _voiceInterim=''; updateVoiceBtns();
      _voiceHidePanel();
    }
  };

  recognition.onerror = e => {
    if(e.error==='aborted'||e.error==='no-speech') return; /* auto-restart handles these */
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      showToast('🎤 Microphone permission denied. Please allow mic access in browser settings.','error',4000);
      isRecording=false; updateVoiceBtns(); _voiceHidePanel();
    } else if(e.error==='network'){
      showToast('⚠️ Voice recognition needs internet for first-time setup in Chrome. Works offline after.','error',4000);
      /* try to keep alive */
    }
  };
}

function voiceRestart(){
  try { recognition.stop(); } catch(ex){}
  setTimeout(()=>{ try{ recognition.lang=_voiceLang; recognition.start(); }catch(ex){} },200);
}

function toggleVoice(el) {
  if (!_voiceHasAPI) {
    showModal('<div class="modal modal-sm"><div class="modal-header"><div class="modal-title">🎤 Voice Input</div><button class="modal-close" onclick="closeModal()">×</button></div>'
      +'<div style="text-align:center;padding:10px;">'
      +'<div style="font-size:40px;margin-bottom:12px;">😔</div>'
      +'<p style="color:var(--text2);margin-bottom:10px;">Your browser does not support Web Speech API.</p>'
      +'<p style="font-size:12px;color:var(--text3);">Please use Chrome, Edge, or Safari for voice input.</p>'
      +'</div></div>');
    return;
  }
  if (isRecording && activeVoiceEl===el) {
    /* Stop */
    _voiceAutoRestart=false;
    try { recognition.stop(); } catch(ex){}
    isRecording=false; activeVoiceEl=null; _voiceInterim='';
    updateVoiceBtns(); _voiceHidePanel();
    _voiceAutoRestart=true;
  } else {
    /* Start (stop previous first) */
    if(isRecording){ _voiceAutoRestart=false; try{recognition.stop();}catch(ex){} _voiceAutoRestart=true; }
    activeVoiceEl=el; el._vbase=el.value; _voiceInterim=''; isRecording=true;
    recognition.lang=_voiceLang;
    try { recognition.start(); } catch(ex){ try{ _voiceBuild(); recognition.start(); }catch(ex2){} }
    updateVoiceBtns();
    _voiceShowPanel(el);
  }
}

function updateVoiceBtns(){
  document.querySelectorAll('.voice-btn').forEach(b=>{
    const forEl=b._voiceTarget;
    b.classList.toggle('recording',isRecording&&activeVoiceEl===forEl);
    b.textContent=isRecording&&activeVoiceEl===forEl?'⏹':'🎤';
  });
}

/* Floating voice status panel */
function _voiceShowPanel(el){

    panel=document.createElement('div');

    +'<div style="flex:1;">'
    +'<div style="font-weight:700;color:var(--text);font-size:12px;">🎤 Listening… <span id="vp-lang" style="color:var(--text3);font-weight:400;">'+_voiceLang+'</span></div>'
    +'<div id="vp-interim" style="color:var(--text2);font-size:11px;font-style:italic;min-height:16px;"></div>'
    +'</div>'

    +'<button onclick="toggleVoice(activeVoiceEl)" class="btn btn-danger btn-sm" style="font-size:11px;">⏹ Stop</button>'
    +'<button onclick="showVoiceLangPicker()" class="btn btn-ghost btn-sm" style="font-size:11px;">🌐 Lang</button>'

  panel.style.display='flex';

  const el=document.getElementById('vp-interim'); if(el) el.textContent=interim?'…'+interim:'';

      <div class="text-muted">${doubtsCleared} of ${doubtsTotal} doubts cleared</div>
    </div>
  </div>
  ${topMistakes.length > 0 ? `<div class="card mt-16">
    <div class="card-title">⚠️ Top Mistake Patterns</div>
    <div style="display:flex;flex-direction:column;gap:8px;">

        <div class="badge badge-danger">${cnt}×</div>
        <div style="width:100px;"><div class="progress-bar"><div class="progress-fill danger" style="width:${Math.round(cnt/tests.length*100)}%"></div></div></div>
      </div>`).join('')}
    </div>
  </div>` : ''}
  ${weakTopics.length > 0 ? `<div class="card mt-16" style="border-left:4px solid var(--danger);">
    <div class="card-title color-danger">⚠️ Weak / Pending Topics (from Diary)</div>

  </div>` : ''}
  <div class="card mt-16">
    <div class="card-title">🚀 Quick Navigation</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="navigate('diary')">📖 Diary</button>
      <button class="btn btn-primary" onclick="navigate('test')">📊 Test Analysis</button>
      <button class="btn btn-primary" onclick="navigate('revision')">🔄 Revision Plan</button>
      <button class="btn btn-primary" onclick="navigate('routine')">📅 Routine</button>
      <button class="btn btn-secondary" onclick="navigate('folders')">📁 Folders</button>
      <button class="btn btn-secondary" onclick="navigate('backup')">💾 Backup</button>
    </div>
  </div>
  ${await (async ()=>{
    const routine = await dbGet(S.ROUTINE,'main-routine');
    if (!routine || !routine.rows || !routine.rows.length) return '';
    let total=0, done=0;
    routine.rows.forEach(r=>r.cells.forEach(c=>{ if(c&&typeof c==='object'){ total++; if(c.done) done++; } }));
    if (!total) return '';
    const pct = Math.round(done/total*100);
    return `<div class="card mt-16">
      <div class="card-title">📅 Today's Routine Progress</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;"><div class="progress-bar"><div class="progress-fill ${pct>=80?'success':pct>=50?'warning':'danger'}" style="width:${pct}%"></div></div></div>
        <div style="font-size:22px;font-weight:800;color:var(--primary)">${pct}%</div>
      </div>
      <div class="text-muted">${done} of ${total} tasks completed <button class="btn btn-ghost btn-sm" style="margin-left:8px;" onclick="navigate('routine')">Open Routine →</button></div>
    </div>`;
  })()}`;
}

async function showDiaryStats() {
  const all = diaryAll.length ? diaryAll : await dbGetAll(S.DIARY);
  const cleared = all.filter(d=>d.doubtCleared).length;
  const byTag = {};
  all.forEach(d=>(d.tags||[]).forEach(t=>{ byTag[t]=(byTag[t]||0)+1; }));
  const bySubj = {};
  all.forEach(d=>{ if(d.subject) bySubj[d.subject]=(bySubj[d.subject]||0)+1; });
  const topSubjs = Object.entries(bySubj).sort((a,b)=>b[1]-a[1]).slice(0,5);
  showModal(`<div class="modal">
    <div class="modal-header"><div class="modal-title">📊 Diary Stats</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="grid-2" style="margin-bottom:14px;">
      <div class="stat-card"><div class="stat-icon">📖</div><div class="stat-num">${all.length}</div><div class="stat-label">Total Entries</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-num color-success">${cleared}</div><div class="stat-label">Doubts Cleared</div></div>
    </div>
    <div class="card" style="margin-bottom:10px;">
      <div class="card-title">🏷 By Tag</div>
      <div class="tags-row">${Object.entries(byTag).map(([t,c])=>`<span class="tag ${TAG_CSS[t]||''}">${t} (${c})</span>`).join('')}</div>
    </div>
    ${topSubjs.length?`<div class="card">
      <div class="card-title">📚 Top Subjects</div>
      ${topSubjs.map(([s,c])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span>${esc(s)}</span><span class="badge badge-info">${c}</span></div>`).join('')}
    </div>`:''}
  </div>`);
}

function clearDiaryFilters() {
  diaryFilter = { q:'', tags:[], subject:'', sort:'newest' };
  const srch = document.getElementById('d-search'); if (srch) srch.value='';
  const subj = document.getElementById('d-subj-f'); if (subj) subj.value='';
  const sort = document.getElementById('d-sort'); if (sort) sort.value='newest';
  document.querySelectorAll('#d-tag-filters .tag').forEach(el => el.classList.remove('selected'));
  renderDiaryList();
}

function toggleDiaryTagFilter(tag) {
  const i = diaryFilter.tags.indexOf(tag);
  if (i>-1) diaryFilter.tags.splice(i,1); else diaryFilter.tags.push(tag);
  document.querySelectorAll('#d-tag-filters .tag').forEach(el =>
    el.classList.toggle('selected', diaryFilter.tags.includes(el.textContent.trim())));
  renderDiaryList();
}

function renderDiaryList() {
  const q = (document.getElementById('d-search')?.value||'').toLowerCase();
  let items = diaryAll.filter(d => {
    if (q && ![(d.title||''),(d.subject||''),(d.topic||''),(d.doubtText||''),(d.notes||'')].join(' ').toLowerCase().includes(q)) return false;
    if (diaryFilter.subject && d.subject !== diaryFilter.subject) return false;
    if (diaryFilter.tags.length && !diaryFilter.tags.every(t=>(d.tags||[]).includes(t))) return false;
    return true;
  });
  const sort = document.getElementById('d-sort')?.value || 'newest';
  if (sort==='newest') items.sort((a,b)=>b.date.localeCompare(a.date));
  else if (sort==='oldest') items.sort((a,b)=>a.date.localeCompare(b.date));
  else items.sort((a,b)=>(a.title||'').localeCompare(b.title||''));

  const container = document.getElementById('d-list');
  if (!container) return;
  const countEl = document.getElementById('d-list-count');
  if (countEl) countEl.textContent = `${items.length} of ${diaryAll.length} entries`;
  container.innerHTML = !items.length
    ? '<div class="text-muted" style="text-align:center;padding:20px;">No entries found</div>'
    : items.map(d=>`<div class="list-item ${curDiary?.id===d.id?'selected':''}" style="position:relative;" onclick="openDiaryForm('${d.id}')">
        <button class="three-dot-btn" onclick="event.stopPropagation();diaryEntryMenu('${d.id}')" title="Options">⋯</button>
        ${d.subject?`<div style="font-size:13px;font-weight:800;color:var(--text);">📚 ${esc(d.subject)}</div>`:''}
        ${d.topic?`<div style="font-size:12px;color:var(--text2);margin-top:1px;">📌 ${esc(d.topic)}</div>`:''}
        <div style="font-size:12px;color:var(--text3);margin-top:1px;">${esc(d.title||'(No title)')} · ${d.date||''}</div>
        <div class="tags-row" style="margin-top:5px;">
          ${(d.tags||[]).map(t=>`<span class="tag ${TAG_CSS[t]||''}" style="font-size:10px;padding:2px 7px;">${t}</span>`).join('')}
          ${d.doubtCleared?'<span class="badge badge-success">✓ Cleared</span>':'<span class="badge badge-warning">⏳ Pending</span>'}
        </div>
      </div>`).join('');
}

      <div class="form-group"><label>📚 Subject</label>
        <input type="text" id="de-subject" value="${esc(curDiary.subject)}" placeholder="e.g. Fluid Mechanics" list="de-subj-list" oninput="autoSD()">
        <datalist id="de-subj-list">${[...new Set(diaryAll.map(d=>d.subject).filter(Boolean))].sort().map(s=>'<option value="'+esc(s)+'">').join('')}</datalist>

        <datalist id="de-topic-list">${[...new Set(diaryAll.map(d=>d.topic).filter(Boolean))].sort().map(t=>'<option value="'+esc(t)+'">').join('')}</datalist>

      <label>❓ Doubt / Question</label>

    </div>
    <div class="form-group">
      <div style="display:flex;justify-content:space-between;align-items:center;"><label>✅ Solution / Answer</label><button type="button" class="btn btn-ghost btn-sm" onclick="copyToClipboard(document.getElementById('de-solution')?.value||'')" title="Copy">📋 Copy</button></div>
      <div class="input-with-voice"><textarea id="de-solution" rows="4" placeholder="Write the solution here..." oninput="autoSD()">${esc(curDiary.solution)}</textarea>${vBtn('de-solution')}</div>
    </div>
    <div class="form-group">
      <label>📝 Notes / Extra Explanation</label>
      <div class="input-with-voice"><textarea id="de-notes" rows="3" placeholder="Additional notes or explanation..." oninput="autoSD()">${esc(curDiary.notes)}</textarea>${vBtn('de-notes')}</div>
    </div>
    <div class="form-group">
      <label>🏷 Tags <span class="text-muted">(click to toggle)</span></label>
      <div class="tags-row" id="de-tags">

function renderImgPreviews(imgs, removeFn, src='diary') {
  return imgs.map((img,i)=>`<div class="img-preview-wrap"><img src="${img}" class="img-preview" onclick="viewBigImg(${i},'${src}')"><button class="img-remove-btn" onclick="${removeFn}(${i})">×</button></div>`).join('');
}

function refreshDImgs() {
  const el = document.getElementById('de-imgs');
  if (el) el.innerHTML = diaryFiles.map((f,i)=>renderFileThumb(f,i,'removeDFile')).join('');
}

function removeDFile(i) { diaryFiles.splice(i,1); refreshDImgs(); autoSD(); }

async function handleDImgUpload(inp) {
  for (const file of inp.files) {
    const rec = await fileToRec(file); if (rec) diaryFiles.push(rec);
  }
  inp.value = '';
  refreshDImgs(); autoSD();
}

function viewBigImg(i, src) {
  i = parseInt(i);
  const recs = src==='diary' ? diaryFiles : testFiles;
  if (!recs || !recs[i]) return;
  const _r=recs[i];
  showModal(`<div class="modal" style="max-width:92vw;text-align:center;">
    <div class="modal-header"><div class="modal-title">🖼 ${esc(_r.name||'Image')}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <img src="${_r.data}" style="max-width:100%;max-height:75vh;border-radius:8px;">
    <div style="margin-top:8px;"><a href="${_r.data}" download="${esc(_r.name||'image.png')}" class="btn btn-secondary btn-sm">⬇ Download</a></div>
  </div>`);
}

function getDiaryData() {
  const tags = [...document.querySelectorAll('#de-tags .tag.selected')].map(t=>t.textContent.trim());
  return {
    id: curDiary.id,
    date: document.getElementById('de-date')?.value || today(),
    subject: document.getElementById('de-subject')?.value || '',
    topic: document.getElementById('de-topic')?.value || '',
    title: document.getElementById('de-title')?.value || '',
    doubtText: document.getElementById('de-doubt')?.value || '',
    solution: document.getElementById('de-solution')?.value || '',
    notes: document.getElementById('de-notes')?.value || '',
    doubtCleared: document.getElementById('de-cleared')?.checked || false,
    folderId: document.getElementById('de-folder')?.value || '',
    tags, files:[...diaryFiles], images:[...diaryFiles.filter(f=>f.type==='image').map(f=>f.data)]
  };
}

function autoSD() {
  if (!curDiary) return;
  debounce('diary-'+curDiary.id, async ()=>{
    const d = getDiaryData();
    await dbPut(S.DIARY, d);
    const i = diaryAll.findIndex(x=>x.id===d.id);
    if (i>-1) diaryAll[i]=d; else diaryAll.push(d);
  });
}

function printDiaryEntry(id) {
  const e = diaryAll.find(d=>d.id===id); if (!e) return;
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${esc(e.title||'Diary Entry')}</title>
  <style>body{font-family:sans-serif;max-width:800px;margin:40px auto;color:#1a1d2e;line-height:1.6}
  h1{font-size:22px}h2{font-size:15px;color:#5a6175}
  .section{margin:20px 0;padding:14px;background:#f5f7fb;border-radius:8px}
  .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;background:#dbeafe;color:#1e40af;margin:2px}
  img{max-width:100%;border-radius:6px;margin-top:8px}</style></head><body>
  <h1>${esc(e.title||'Untitled')}</h1>
  <h2>📅 ${e.date} · 📚 ${esc(e.subject||'')} · 📌 ${esc(e.topic||'')}</h2>
  ${(e.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
  ${e.doubtText?`<div class="section"><strong>❓ Doubt / Question:</strong><br>${esc(e.doubtText).replace(/\n/g,'<br>')}</div>`:''}
  ${e.solution?`<div class="section"><strong>✅ Solution:</strong><br>${esc(e.solution).replace(/\n/g,'<br>')}</div>`:''}
  ${e.notes?`<div class="section"><strong>📝 Notes:</strong><br>${esc(e.notes).replace(/\n/g,'<br>')}</div>`:''}
  ${(e.images||[]).map(img=>`<img src="${img}">`).join('')}
  <p style="color:#8892a4;font-size:11px;margin-top:30px;">Exported from GATE/ESE Prep Tracker · ${new Date().toLocaleDateString()}</p>
  <\/body><\/html>`);
  w.document.close(); setTimeout(()=>w.print(), 500);
}

async function saveDiaryEntry() {
  if (!curDiary) return;
  const d = getDiaryData();
  await dbPut(S.DIARY, d);
  const i = diaryAll.findIndex(x=>x.id===d.id);
  if (i>-1) diaryAll[i]=d; else diaryAll.push(d);
  renderDiaryList();
  showToast('✓ Diary entry saved!');
}

async function delDiaryEntry(id) {
  if (!await confirmDlg('Permanently delete this diary entry?')) return;
  await dbDelete(S.DIARY, id);
  diaryAll = diaryAll.filter(d=>d.id!==id);
  curDiary = null;
  renderDiaryList();
  document.getElementById('d-detail').innerHTML = '<div class="split-empty"><div class="split-empty-icon">🗑️</div><div>Entry deleted</div></div>';
}

async function dupeDiaryEntry(id) {
  const orig = diaryAll.find(d=>d.id===id); if (!orig) return;
  const clone = { ...orig, id:genId(), title:(orig.title||'Untitled')+' (Copy)', date:today() };
  await dbPut(S.DIARY, clone);
  diaryAll.push(clone);
  renderDiaryList();
  openDiaryForm(clone.id);
  showToast('✓ Duplicated!');
}

  all.forEach(t=>{ if(t.subject) bySubj[t.subject]=(bySubj[t.subject]||0)+1; });

  all.forEach(t=>{ if(t.topic) byTopic[t.topic]=(byTopic[t.topic]||0)+1; });
  const topMistakes = Object.entries(byMistake).sort((a,b)=>b[1]-a[1]);
  const topSubjs = Object.entries(bySubj).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topTopics = Object.entries(byTopic).sort((a,b)=>b[1]-a[1]).slice(0,5);
  showModal(`<div class="modal">
    <div class="modal-header"><div class="modal-title">📊 Test Analysis Stats</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="grid-2" style="margin-bottom:12px;">
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-num">${all.length}</div><div class="stat-label">Total Entries</div></div>
      <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-num">${Object.keys(byTopic).length}</div><div class="stat-label">Unique Topics</div></div>
    </div>
    ${topMistakes.length?`<div class="card" style="margin-bottom:10px;">
      <div class="card-title color-danger">⚠️ Mistake Breakdown</div>
      ${topMistakes.map(([cat,cnt])=>`<div style="display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);">
        <div style="flex:1;font-size:12px;">${esc(cat)}</div>
        <span class="badge badge-danger">${cnt}</span>
        <div style="width:80px;"><div class="progress-bar"><div class="progress-fill danger" style="width:${Math.round(cnt/all.length*100)}%"></div></div></div>
      </div>`).join('')}
    </div>`:''}
    ${topTopics.length?`<div class="card">
      <div class="card-title">🔥 Most Mistakes By Topic</div>
      ${topTopics.map(([t,c])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);"><span style="font-size:12px;">${esc(t)}</span><span class="badge badge-warning">${c}</span></div>`).join('')}
    </div>`:''}
  </div>`);
}

function toggleSelTopic(idx) {
  const tp = (window._testTopics||[])[idx];
  if (tp === undefined) return;
  selTopic = selTopic === tp ? '' : tp;
  renderTestList();
}

function filterTList() {
  const q = (document.getElementById('t-search')?.value||'').toLowerCase();
  const subj = (document.getElementById('t-subj-f')?.value||'').toLowerCase();
  document.querySelectorAll('#t-date-groups .list-item, #t-topic-groups .list-item').forEach(el=>{
    const txt = el.textContent.toLowerCase();
    const matchQ = !q || txt.includes(q);
    const matchS = !subj || txt.includes(subj);
    el.style.display = (matchQ && matchS) ? '' : 'none';
  });
}

function getTestData() {
  return {
    id: curTest.id,
    date: document.getElementById('te-date')?.value || today(),
    examName: document.getElementById('te-exam')?.value || '',
    subject: document.getElementById('te-subject')?.value || '',
    topic: document.getElementById('te-topic')?.value || '',
    question: document.getElementById('te-question')?.value || '',
    mistakeCat: document.getElementById('te-mistcat')?.value || '',
    mistakeText: document.getElementById('te-mistake')?.value || '',
    solution: document.getElementById('te-solution')?.value || '',
    learning: document.getElementById('te-learning')?.value || '',
    files:[...testFiles], images:[...testFiles.filter(f=>f.type==='image').map(f=>f.data)]
  };
}

function autoST() {
  if (!curTest) return;
  debounce('test-'+curTest.id, async ()=>{
    const d = getTestData();
    await dbPut(S.TEST, d);
    const i = testAll.findIndex(x=>x.id===d.id);
    if (i>-1) testAll[i]=d; else testAll.push(d);
    renderTestList();
  });
}

async function saveTestEntry() {
  if (!curTest) return;
  const d = getTestData();
  await dbPut(S.TEST, d);
  const i = testAll.findIndex(x=>x.id===d.id);
  if (i>-1) testAll[i]=d; else testAll.push(d);
  renderTestList();
  showToast('✓ Test entry saved!');
}

async function delTestEntry(id) {
  if (!await confirmDlg('Permanently delete this test entry?')) return;
  await dbDelete(S.TEST, id);
  testAll = testAll.filter(t=>t.id!==id);
  curTest = null;
  renderTestList();
  document.getElementById('t-detail').innerHTML = '<div class="split-empty"><div class="split-empty-icon">🗑️</div><div>Entry deleted</div></div>';
}

async function dupeTestEntry(id) {
  const orig = testAll.find(t=>t.id===id); if (!orig) return;
  const clone = { ...orig, id:genId(), date:today() };
  await dbPut(S.TEST, clone);
  testAll.push(clone);
  renderTestList();
  openTestForm(clone.id);
  showToast('✓ Duplicated!');
}

function renderRevCard(r) {
  if (!_revFiles[r.id]) _revFiles[r.id] = (r.files||[]);
  const files = _revFiles[r.id];
  return `<div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;" id="rcard-${r.id}">
    <div style="display:flex;gap:8px;align-items:flex-start;">

        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <select style="font-size:12px;padding:4px 8px;width:auto;" onchange="autoSRev('${r.id}','status',this.value)">
            <option value="pending" ${r.status==='pending'?'selected':''}>⏳ Pending</option>
            <option value="revised" ${r.status==='revised'?'selected':''}>✅ Revised</option>
            <option value="revise_again" ${r.status==='revise_again'?'selected':''}>🔄 Revise Again</option>
          </select>
          <label style="cursor:pointer;font-size:11px;color:var(--primary);border:1px solid var(--border);border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;gap:4px;">

          </label>

        </div>
        ${files.length?`<div id="rev-files-${r.id}" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${files.map((f,fi)=>renderRevFileThumb(f,fi,r.id)).join('')}</div>`:'<div id="rev-files-'+r.id+'"></div>'}

function renderRevFileThumb(f, fi, rid) {
  if (!f || !f.data) return '';
  if (f.type==='pdf') {
    return `<div style="display:inline-flex;align-items:center;gap:5px;background:var(--danger-bg);border-radius:7px;padding:4px 8px;font-size:11px;">
      <span>📄</span><span style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(f.name||'file.pdf')}</span>
      <button onclick="openRevPDF('${rid}',${fi})" style="border:none;background:none;cursor:pointer;color:var(--info);font-size:11px;font-weight:700;">Open</button>
      <button onclick="delRevFile('${rid}',${fi})" style="border:none;background:none;cursor:pointer;color:var(--danger);font-size:14px;line-height:1;">×</button>
    </div>`;
  }
  return `<div class="img-preview-wrap">
    <img src="${f.data}" class="img-preview" onclick="viewRevImg('${rid}',${fi})" style="max-width:80px;max-height:60px;">
    <button class="img-remove-btn" onclick="delRevFile('${rid}',${fi})">×</button>
  </div>`;
}

async function handleRevFileUpload(inp, rid) {
  if (!_revFiles[rid]) _revFiles[rid]=[];
  for (const file of inp.files) {
    const rec = await fileToRec(file); if (rec) _revFiles[rid].push(rec);
  }
  inp.value='';
  /* update the item in revAll and save */
  const item = revAll.find(r=>r.id===rid); if (!item) return;
  item.files = [..._revFiles[rid]];
  await dbPut(S.REVISION, item);
  /* refresh just the file container */
  const fc = document.getElementById('rev-files-'+rid);
  if (fc) fc.innerHTML = _revFiles[rid].map((f,fi)=>renderRevFileThumb(f,fi,rid)).join('');
  showToast('✓ File attached!');
}

function viewRevImg(rid, fi) {
  const f=(_revFiles[rid]||[])[fi]; if (!f?.data) return;
  showModal(`<div class="modal" style="max-width:92vw;text-align:center;">
    <div class="modal-header"><div class="modal-title">🖼 ${esc(f.name||'Image')}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <img src="${f.data}" style="max-width:100%;max-height:75vh;border-radius:8px;">
    <div style="margin-top:8px;"><a href="${f.data}" download="${esc(f.name||'image.png')}" class="btn btn-secondary btn-sm">⬇ Download</a></div>
  </div>`);
}

function openRevPDF(rid, fi) {
  const f=(_revFiles[rid]||[])[fi]; if (!f?.data) return;
  const byteStr=atob(f.data.split(',')[1]);
  const ab=new ArrayBuffer(byteStr.length); const ia=new Uint8Array(ab);
  for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
  window.open(URL.createObjectURL(new Blob([ab],{type:'application/pdf'})),'_blank');
}

async function delRevFile(rid, fi) {
  if (!await confirmDlg('Delete this attached file?')) return;
  if (!_revFiles[rid]) return;
  _revFiles[rid].splice(fi,1);
  const item = revAll.find(r=>r.id===rid); if (!item) return;
  item.files = [..._revFiles[rid]];
  await dbPut(S.REVISION, item);
  const fc = document.getElementById('rev-files-'+rid);
  if (fc) fc.innerHTML = _revFiles[rid].map((f,i)=>renderRevFileThumb(f,i,rid)).join('');
}

async function addRevItem(planType) {
  if (!planType || !['45min','sleep','checklist'].includes(planType)) planType='checklist';
  const item = { id:genId(), planType, topic:'', notes:'', status:'pending' };
  await dbPut(S.REVISION, item);
  revAll.push(item);
  renderRevision();
}

async function quickAddRevision() {
  await addRevItem('checklist');
}

function autoSRev(id, field, val) {
  const item = revAll.find(r=>r.id===id); if (!item) return;
  item[field] = val;
  if (_revFiles[id]) item.files = [..._revFiles[id]];
  debounce('rev-'+id, ()=>dbPut(S.REVISION, item));
}

async function delRevItem(id) {
  if (!await confirmDlg('Delete this revision item?')) return;
  await dbDelete(S.REVISION, id);
  revAll = revAll.filter(r=>r.id!==id);
  renderRevision();
}

function showAddRevPrompt() {

    <div class="modal-header"><div class="modal-title">＋ Add Revision Topic</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <p class="text-muted" style="margin-bottom:12px;">Choose the revision plan to add this topic to:</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary" onclick="closeModal();addRevItem('45min')">⏱ 45-Minute Plan</button>
      <button class="btn btn-primary" onclick="closeModal();addRevItem('sleep')">🌙 Before-Sleep Revision</button>
      <button class="btn btn-primary" onclick="closeModal();addRevItem('checklist')">📋 Topic Checklist</button>
    </div>

}

async function addWeakTopic(topic) {
  const exists = revAll.some(r=>r.topic===topic && r.planType==='checklist');

/* ============================================================
   SECTION 5: ROUTINE
   ============================================================ */
let routineData = { id:'main-routine', columns:['Subject / Task'], rows:[] };
let routineLoaded = false; // track if loaded from DB

/* Save immediately (not debounced) then rebuild table */
async function saveAndRebuildRoutine() {
  await dbPut(S.ROUTINE, routineData);
  buildRoutineTable();
}
function autoSR() { debounce('routine', ()=>dbPut(S.ROUTINE, routineData)); }

async function renderRoutine() {
  /* Only reload from DB on first visit or after external changes */
  if (!routineLoaded) {
    const saved = await dbGet(S.ROUTINE, 'main-routine');
    if (saved) routineData = saved;
    routineLoaded = true;
  }
  if (!routineData.rows || !routineData.rows.length) {
    routineData.rows = [{ time:'5:00 AM – 6:00 AM', cells:[{task:'',done:false}] }];
  }
  if (!routineData.columns || !routineData.columns.length) {
    routineData.columns = ['Subject / Task'];
  }

  const el = document.getElementById('sec-routine');
  el.innerHTML = `
  <div class="section-header">
    <h2>📅 Study Routine</h2>
    <div class="btn-row" style="flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" onclick="addRRow()">＋ Time Slot</button>
      <button class="btn btn-secondary btn-sm" onclick="showAddColModal()">＋ Column</button>
      <button class="btn btn-success btn-sm" onclick="markAllRoutineDone()">✓ All Done</button>
      <button class="btn btn-ghost btn-sm" onclick="unmarkAllRoutine()">↺ Uncheck</button>
      <button class="btn btn-danger btn-sm" onclick="resetRoutine()">⚠️ Reset</button>
    </div>
  </div>
  <div id="routine-stats" style="margin-bottom:10px;"></div>
  <div class="card" style="padding:8px;">
    <div class="routine-wrap">
      <table class="routine-table" id="rtable"></table>
    </div>
  </div>`;
  buildRoutineTable();
  updateRoutineStats();
}

function buildRoutineTable() {
  const tbl = document.getElementById('rtable');
  if (!tbl) return;

  /* ── HEADER ── */
  let headHTML = '<thead><tr><th style="min-width:140px;white-space:nowrap;">⏰ Time Slot</th>';
  routineData.columns.forEach((c, ci) => {
    headHTML += `<th style="min-width:140px;">
      <div style="display:flex;align-items:center;gap:4px;">
        <input type="text" data-col="${ci}" class="rcol-input" value="${esc(c)}"
          style="font-size:12px;min-width:90px;font-weight:700;" placeholder="Column name">
        ${ci>0?`<button class="rbtn-del-col" data-col="${ci}" title="Delete column"
          style="border:none;background:none;cursor:pointer;color:var(--danger);font-size:16px;flex-shrink:0;">×</button>`:''}
      </div></th>`;
  });
  headHTML += '<th style="width:40px;"></th></tr></thead>';

  /* ── BODY ── */
  let bodyHTML = '<tbody>';
  routineData.rows.forEach((row, ri) => {
    bodyHTML += `<tr data-row="${ri}">
      <td><input type="text" class="rtime-input" data-row="${ri}" value="${esc(row.time||'')}"
        placeholder="e.g. 6–7 AM" style="min-width:120px;"></td>`;
    routineData.columns.forEach((_, ci) => {
      const raw  = row.cells[ci];
      const cell = (raw && typeof raw==='object') ? raw : {task: typeof raw==='string'?raw:'', done:false};
      bodyHTML += `<td>
        <div class="cell-inner" style="gap:6px;align-items:flex-start;flex-direction:column;">
          <div style="display:flex;align-items:center;gap:6px;width:100%;">
            <input type="checkbox" class="rcell-done" data-row="${ri}" data-col="${ci}" ${cell.done?'checked':''}>
            <input type="text" class="rcell-task" data-row="${ri}" data-col="${ci}" value="${esc(cell.task||'')}"
              placeholder="Task..." style="flex:1;${cell.done?'text-decoration:line-through;color:var(--text3);':''}">
          </div>
          ${(cell.files||[]).length?cell.files.map((f,fi)=>renderRoutineFileThumb(f,ri,ci,fi)).join(''):''}
          <label style="cursor:pointer;font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:2px;">
            📎 <input type="file" accept="image/*,.pdf,.png,.jpg,.jpeg,.gif,.webp" multiple
              class="rcell-file" data-row="${ri}" data-col="${ci}" style="display:none;">Attach
          </label>
        </div></td>`;
    });
    bodyHTML += `<td><button class="rbtn-del-row" data-row="${ri}"
      style="border:none;background:none;cursor:pointer;color:var(--danger);font-size:18px;line-height:1;"
      title="Delete row">×</button></td></tr>`;
  });
  bodyHTML += '</tbody>';

  tbl.innerHTML = headHTML + bodyHTML;
  attachRoutineEvents();
}

function renderRoutineFileThumb(f, ri, ci, fi) {
  if (!f || !f.data) return '';
  if (f.type==='pdf') {
    return `<div style="display:flex;align-items:center;gap:4px;background:var(--danger-bg);border-radius:6px;padding:3px 7px;font-size:11px;margin-top:3px;">
      <span>📄</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;">${esc(f.name||'file.pdf')}</span>
      <button onclick="openPDF('${ri}','${ci}','${fi}')" style="border:none;background:none;cursor:pointer;color:var(--info);font-size:11px;">Open</button>
      <button onclick="delRFile(${ri},${ci},${fi})" style="border:none;background:none;cursor:pointer;color:var(--danger);font-size:13px;">×</button>
    </div>`;
  }
  return `<div style="position:relative;display:inline-block;margin-top:3px;">
    <img src="${f.data}" style="max-width:80px;max-height:60px;border-radius:6px;border:1px solid var(--border);cursor:zoom-in;"
      onclick="viewRoutineImg(${ri},${ci},${fi})">
    <button onclick="delRFile(${ri},${ci},${fi})"
      style="position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;">×</button>
  </div>`;
}

function attachRoutineEvents() {
  const tbl = document.getElementById('rtable'); if (!tbl) return;

  /* Column name edits */
  tbl.querySelectorAll('.rcol-input').forEach(inp => {
    inp.addEventListener('input', () => {
      routineData.columns[+inp.dataset.col] = inp.value;
      autoSR();
    });
  });

  /* Time slot edits */
  tbl.querySelectorAll('.rtime-input').forEach(inp => {
    inp.addEventListener('input', () => {
      routineData.rows[+inp.dataset.row].time = inp.value;
      autoSR();
    });
  });

  /* Cell task edits */
  tbl.querySelectorAll('.rcell-task').forEach(inp => {
    inp.addEventListener('input', () => {
      const ri=+inp.dataset.row, ci=+inp.dataset.col;
      ensureCell(ri,ci);
      routineData.rows[ri].cells[ci].task = inp.value;
      inp.style.textDecoration = routineData.rows[ri].cells[ci].done ? 'line-through' : '';
      inp.style.color = routineData.rows[ri].cells[ci].done ? 'var(--text3)' : '';
      autoSR();
    });
  });

  /* Cell done checkboxes */
  tbl.querySelectorAll('.rcell-done').forEach(cb => {
    cb.addEventListener('change', () => {
      const ri=+cb.dataset.row, ci=+cb.dataset.col;
      ensureCell(ri,ci);
      routineData.rows[ri].cells[ci].done = cb.checked;
      const taskInp = tbl.querySelector(`.rcell-task[data-row="${ri}"][data-col="${ci}"]`);
      if (taskInp) { taskInp.style.textDecoration=cb.checked?'line-through':''; taskInp.style.color=cb.checked?'var(--text3)':''; }
      autoSR();
      updateRoutineStats();
    });
  });

  /* Delete row */
  tbl.querySelectorAll('.rbtn-del-row').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!await confirmDlg('Delete this time slot row?')) return;
      routineData.rows.splice(+btn.dataset.row,1); saveAndRebuildRoutine(); updateRoutineStats();
    });
  });

  /* Delete col */
  tbl.querySelectorAll('.rbtn-del-col').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!await confirmDlg('Delete this column and all its data?')) return;
      const ci=+btn.dataset.col;
      routineData.columns.splice(ci,1);
      routineData.rows.forEach(r=>r.cells.splice(ci,1));
      saveAndRebuildRoutine(); updateRoutineStats();
    });
  });

  /* File upload per cell */
  tbl.querySelectorAll('.rcell-file').forEach(inp => {
    inp.addEventListener('change', async () => {
      const ri=+inp.dataset.row, ci=+inp.dataset.col;
      ensureCell(ri,ci);
      if (!routineData.rows[ri].cells[ci].files) routineData.rows[ri].cells[ci].files=[];
      for (const file of inp.files) {
        const rec = await fileToRec(file);
        if (rec) routineData.rows[ri].cells[ci].files.push(rec);
      }
      inp.value='';
      await saveAndRebuildRoutine();
      showToast('✓ File attached!');
    });
  });
}

function ensureCell(ri,ci) {
  const raw = routineData.rows[ri].cells[ci];
  if (!raw || typeof raw!=='object') routineData.rows[ri].cells[ci]={task:typeof raw==='string'?raw:'',done:false,files:[]};
  if (!routineData.rows[ri].cells[ci].files) routineData.rows[ri].cells[ci].files=[];
}

function updateRoutineStats() {
  const el=document.getElementById('routine-stats'); if (!el) return;
  let total=0,done=0;
  routineData.rows.forEach(r=>r.cells.forEach(c=>{ if(c&&typeof c==='object'&&c.task){total++;if(c.done)done++;} }));
  if (!total) { el.innerHTML=''; return; }
  const pct=Math.round(done/total*100);
  el.innerHTML=`<div style="display:flex;align-items:center;gap:10px;">
    <div style="flex:1;"><div class="progress-bar"><div class="progress-fill ${pct>=80?'success':pct>=50?'warning':'danger'}" style="width:${pct}%"></div></div></div>
    <span style="font-size:13px;font-weight:700;color:var(--primary)">${pct}% done</span>
    <span class="text-muted">(${done}/${total} tasks)</span>
  </div>`;
}

function viewRoutineImg(ri,ci,fi) {
  const f=(routineData.rows[ri]?.cells[ci]?.files||[])[fi]; if(!f) return;
  showModal(`<div class="modal" style="max-width:92vw;text-align:center;">
    <div class="modal-header"><div class="modal-title">🖼 ${esc(f.name||'Image')}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <img src="${f.data}" style="max-width:100%;max-height:75vh;border-radius:8px;">
    <div style="margin-top:8px;"><a href="${f.data}" download="${esc(f.name||'image.png')}" class="btn btn-secondary btn-sm">⬇ Download</a></div>
  </div>`);
}

function openPDF(ri,ci,fi) {
  const f=(routineData.rows[+ri]?.cells[+ci]?.files||[])[+fi]; if(!f||!f.data) return;
  const blob=new Blob([Uint8Array.from(atob(f.data.split(',')[1]),c=>c.charCodeAt(0))],{type:'application/pdf'});
  window.open(URL.createObjectURL(blob),'_blank');
}

async function delRFile(ri,ci,fi) {
  if (!await confirmDlg('Delete this attached file?')) return;
  ensureCell(ri,ci);
  routineData.rows[ri].cells[ci].files.splice(fi,1);
  await saveAndRebuildRoutine();
}

function showAddColModal() {
  showModal(`<div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title">＋ Add Column</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-group">
      <label>Column Name</label>
      <input type="text" id="new-col-name" placeholder="e.g. Monday, Physics, Morning Tasks..."
        style="margin-bottom:12px;" onkeydown="if(event.key==='Enter')confirmAddCol()">
    </div>
    <div class="form-group">
      <label>Quick Templates</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
        ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday',
           'Physics','Maths','Aptitude','Morning','Evening','Revision'].map(t=>
          `<span class="tag tag-concept" style="cursor:pointer;" onclick="document.getElementById('new-col-name').value='${t}'">${t}</span>`
        ).join('')}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddCol()">＋ Add Column</button>
    </div>
  </div>`);
  setTimeout(()=>document.getElementById('new-col-name')?.focus(),100);
}

function confirmAddCol() {
  const name=(document.getElementById('new-col-name')?.value||'').trim();
  if (!name) { showToast('Enter a column name','error'); return; }
  closeModal();
  routineData.columns.push(name);
  routineData.rows.forEach(r=>{
    if (!r.cells) r.cells=[];
    r.cells.push({task:'',done:false,files:[]});
  });
  saveAndRebuildRoutine();
  updateRoutineStats();
  showToast(`✓ Column "${name}" added!`);
}

function addRRow() {
  if (!routineData.rows) routineData.rows=[];
  routineData.rows.push({ time:'', cells:routineData.columns.map(()=>({task:'',done:false,files:[]})) });
  saveAndRebuildRoutine();
  updateRoutineStats();
  /* scroll to bottom of table */
  setTimeout(()=>{
    const tbl=document.getElementById('rtable'); if (!tbl) return;
    const rows=tbl.querySelectorAll('tbody tr');
    if (rows.length) { const lastInput=rows[rows.length-1].querySelector('.rtime-input'); if(lastInput) lastInput.focus(); }
  },80);
}

async function resetRoutine() {
  if (!await confirmDlg('Reset the entire routine table?')) return;
  routineData = { id:'main-routine', columns:['Subject / Task'], rows:[{ time:'5:00 AM – 6:00 AM', cells:[{task:'',done:false,files:[]}] }] };
  await dbPut(S.ROUTINE, routineData);
  buildRoutineTable();
  updateRoutineStats();
}

function unmarkAllRoutine() {
  routineData.rows.forEach(row => row.cells.forEach((_,ci) => {
    if (row.cells[ci] && typeof row.cells[ci]==='object') row.cells[ci].done = false;
  }));
  dbPut(S.ROUTINE, routineData);
  buildRoutineTable();
  updateRoutineStats();
  showToast('All tasks unchecked');
}

function markAllRoutineDone() {
  routineData.rows.forEach((row,ri) => row.cells.forEach((_,ci) => {
    ensureCell(ri,ci);
    routineData.rows[ri].cells[ci].done = true;
  }));
  dbPut(S.ROUTINE, routineData);
  buildRoutineTable();
  updateRoutineStats();
  showToast('✓ All tasks marked done!');
}

let foldersAll = [], selFolderId = null, folderOpen = {};

async function renderFolders() {
  foldersAll = await dbGetAll(S.FOLDERS);

  el.innerHTML = `
  <div style="display:flex;gap:16px;height:calc(100vh - 125px);">

      <div class="btn-row" style="margin-bottom:12px;">

      <div id="folder-tree">${buildFolderTree(null)}</div>

function buildFolderTree(parentId, depth=0) {
  const children = foldersAll.filter(f=>f.parentId===parentId);
  if (!children.length) return '';
  return children.map(f=>`
    <div class="folder-node">
      <div class="folder-row ${selFolderId===f.id?'active':''}" onclick="clickFolder('${f.id}')">
        <span class="folder-toggle">${folderOpen[f.id]?'▼':'▶'}</span>
        <span style="font-size:16px;">${f.type==='app'?'🔌':'📁'}</span>
        <span style="flex:1;">${esc(f.name)}</span>
        <button style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 2px;" onclick="event.stopPropagation();folderContextMenu('${f.id}')">⋯</button>
      </div>
      ${folderOpen[f.id]?`<div class="folder-children">${buildFolderTree(f.id, depth+1)}</div>`:''}
    </div>`).join('');
}

async function clickFolder(id) {
  selFolderId = id;
  folderOpen[id] = !folderOpen[id];
  document.getElementById('folder-tree').innerHTML = buildFolderTree(null);
  await showFolderContent(id);
}

async function showFolderContent(id) {
  const folder = foldersAll.find(f=>f.id===id);
  const contentEl = document.getElementById('folder-content');
  if (!folder || !contentEl) return;

  if (folder.type === 'app') {
    var fid = id; // use local var
    contentEl.innerHTML = '<div style="display:flex;flex-direction:column;height:100%;gap:10px;">'
      +'<div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">'
      +'<span style="font-size:18px;">🔌</span>'
      +'<strong>'+esc(folder.name)+'</strong>'

      +'</div>';
    launchEmbeddedApp(fid, folder);

  }
  // Normal folder: show subfolders + linked diary entries

  const diaryEntries = await dbGetAll(S.DIARY).then(all=>all.filter(d=>d.folderId===id));

  contentEl.innerHTML = `
    <div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
        <span style="font-size:20px;">📁</span>
        <strong style="font-size:16px;">${esc(folder.name)}</strong>
        <button class="btn btn-secondary btn-sm" onclick="createFolder('${id}')">＋ Subfolder</button>
        <button class="btn btn-primary btn-sm" onclick="importApp('${id}')">🔌 Import App</button>
      </div>
      ${subfolders.length?`<div class="card" style="margin-bottom:12px;">
        <div class="card-title">📂 Subfolders</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${subfolders.map(sf=>`<div style="background:var(--surface2);padding:10px 14px;border-radius:10px;cursor:pointer;border:1px solid var(--border);" onclick="clickFolder('${sf.id}')">
            ${sf.type==='app'?'🔌':'📁'} ${esc(sf.name)}

      </div>`:''}

        <div class="card-title">📖 Diary Entries in this folder (${diaryEntries.length})</div>

async function importApp(folderId) {
  const input = document.createElement('input');
  input.type='file'; input.accept='.html,.htm';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    const sizeMB = (file.size/1048576).toFixed(1);
    /* Show progress modal */
    showModal('<div class="modal modal-sm" style="text-align:center;">'
      +'<div class="modal-header" style="justify-content:center;"><div class="modal-title">📥 Importing App</div></div>'
      +'<div style="margin:14px 0;">'
      +'<div style="font-size:13px;color:var(--text2);margin-bottom:10px;">Loading <b>'+esc(file.name)+'</b> ('+sizeMB+' MB)…</div>'
      +'<div class="progress-bar" style="height:10px;"><div id="import-prog" class="progress-fill" style="width:0%;transition:width .3s;"></div></div>'
      +'<div id="import-status" style="font-size:11px;color:var(--text3);margin-top:6px;">Reading file…</div>'
      +'</div></div>');

    try {
      /* Use streaming text read with progress reporting */
      const text = await readFileWithProgress(file);
      const progEl=document.getElementById('import-prog');
      const statEl=document.getElementById('import-status');
      if(progEl) progEl.style.width='80%';
      if(statEl) statEl.textContent='Saving to database…';

      /* Store in dedicated appstore; fall back to inline if store unavailable */
      const f = foldersAll.find(x=>x.id===folderId);
      if (!f) { closeModal(); return; }
      f.type = 'app';
      try {
        await dbPutRaw('appstore', {id:'app-'+folderId, folderId, name:file.name, size:file.size, data:text});
        f.appStoreId = 'app-'+folderId;
        delete f.appData;
      } catch(storeErr) {
        /* appstore not available yet — store inline (works for smaller files) */
        console.warn('appstore unavailable, using inline:', storeErr.message);
        f.appData = text;
        delete f.appStoreId;
      }
      await dbPut(S.FOLDERS, f);

      if(progEl) progEl.style.width='100%';
      if(statEl) statEl.textContent='Done!';
      setTimeout(()=>{
        closeModal();
        showToast('✓ App imported ('+sizeMB+' MB)! Click the folder to launch.','success',3000);
        folderOpen[folderId]=true;
        renderFolders();
        setTimeout(()=>clickFolder(folderId),300);
      },500);
    } catch(err) {
      closeModal();
      showToast('❌ Import failed: '+err.message,'error',4000);
    }
  };
  input.click();
}

/* Progress-reporting file reader — handles large files without freezing UI */
function readFileWithProgress(file) {
  return new Promise((resolve, reject) => {
    const CHUNK = 1024*1024; /* 1 MB chunks */
    let offset=0, parts=[];
    const reader = new FileReader();
    function readNext() {
      const slice = file.slice(offset, offset+CHUNK);
      reader.readAsText(slice, 'UTF-8');
    }
    reader.onload = e => {
      parts.push(e.target.result);
      offset += CHUNK;
      const pct = Math.min(75, Math.round(offset/file.size*75));
      const progEl=document.getElementById('import-prog');
      const statEl=document.getElementById('import-status');
      if(progEl) progEl.style.width=pct+'%';
      if(statEl) statEl.textContent='Reading… '+pct+'%';
      if(offset < file.size) { readNext(); }
      else { resolve(parts.join('')); }
    };
    reader.onerror = () => reject(reader.error);
    readNext();
  });
}

/* Raw put to any store by name */
function dbPutRaw(storeName, data) {
  return new Promise((res,rej)=>{
    try {
      const tx=db.transaction(storeName,'readwrite');
      const r=tx.objectStore(storeName).put(data);
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej(r.error);
    } catch(e) {
      /* Store missing — DB needs upgrade. Reload will fix it. */
      rej(new Error('Store "'+storeName+'" not ready. Please reload the page once and retry.'));
    }
  });
}
function dbGetRaw(storeName, key) {
  return new Promise((res,rej)=>{
    try {
      const tx=db.transaction(storeName,'readonly');
      const r=tx.objectStore(storeName).get(key);
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej(r.error);
    } catch(e) {
      res(null); /* Store missing — return null, caller handles fallback */
    }
  });
}

async function launchEmbeddedApp(folderId, folder) {
  const loadDiv = document.getElementById('appframe-loading-'+folderId);
  const iframe  = document.getElementById('appframe-'+folderId);
  if (!iframe) return;
  try {
    /* Try appstore first (new system), fall back to inline appData (old system) */
    let htmlText = null;
    if (folder.appStoreId) {
      const rec = await dbGetRaw('appstore', folder.appStoreId);
      if (rec) htmlText = rec.data;
    }
    if (!htmlText && folder.appData) htmlText = folder.appData; /* backward compat */
    if (!htmlText) {
      if(loadDiv) loadDiv.innerHTML='<div style="color:var(--danger);">❌ App data not found. Please re-import.</div>';
      return;
    }
    const blob = new Blob([htmlText], {type:'text/html'});
    const url  = URL.createObjectURL(blob);
    iframe.onload = () => {
      if(loadDiv) loadDiv.style.display='none';
      iframe.style.display='block';
    };
    iframe.src = url;
  } catch(err) {
    if(loadDiv) loadDiv.innerHTML='<div style="color:var(--danger);">❌ Failed to load: '+err.message+'</div>';
  }
}

async function reloadApp(folderId) {
  const folder = foldersAll.find(f=>f.id===folderId);
  if (!folder) return;
  const iframe = document.getElementById('appframe-'+folderId);
  const loadDiv= document.getElementById('appframe-loading-'+folderId);
  if(iframe){ iframe.style.display='none'; iframe.src=''; }
  if(loadDiv){ loadDiv.style.display='block'; loadDiv.innerHTML='⏳ Reloading…'; }
  await launchEmbeddedApp(folderId, folder);
}

  renderFolders();
}

  };

async function importAll(mode) {
  const file = document.getElementById('import-file')?.files[0];
  if (!file) { showToast('Select a JSON file first','error',2500); return; }
  if (mode==='replace' && !await confirmDlg('This will REPLACE all existing data with the imported file. Confirm?')) return;

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !Array.isArray(data.diary)) throw new Error('Invalid format');
      if (mode==='replace') { for (const store of Object.values(S)) await dbClear(store); }
      const putAll = async (store, items) => { if (!Array.isArray(items)) return; for (const item of items) await dbPut(store,item); };
      await putAll(S.DIARY, data.diary);
      await putAll(S.TEST, data.test);
      await putAll(S.REVISION, data.revision);
      await putAll(S.ROUTINE, data.routine);
      await putAll(S.FOLDERS, data.folders);
      await putAll(S.SETTINGS, data.settings);
      showToast('✓ Data imported successfully!','success',3000);
      renderSection(currentSection);
    } catch(err) {
      showToast('❌ Invalid or corrupt backup file','error',3000);
    }
  };
  reader.readAsText(file);
}

async function nukeAll() {
  if (!await confirmDlg('⚠️ DELETE ALL DATA permanently? This cannot be undone! Export first!')) return;
  for (const store of Object.values(S)) await dbClear(store);
  routineLoaded = false;
  diaryFiles = []; testFiles = []; _revFiles = {};
  curDiary = null; curTest = null; revAll = [];
  showToast('All data cleared','error',3000);
  renderSection(currentSection);
}
