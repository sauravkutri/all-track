    +'<option value="0">Until dismissed</option>'
    +'</select>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'
    +'<div style="font-size:11px;color:var(--text2);margin-bottom:5px;">Repeat days</div>'
    +'<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">'+dayChips+'</div>'
    +'</div>'
    +'<div class="btn-row" style="justify-content:center;gap:8px;margin-bottom:12px;">'
    +'<button class="btn btn-success" onclick="alAdd()">＋ Set Alarm</button>'
    +'<button id="al-snooze" class="btn btn-warning hidden" onclick="alSnooze()">💤 Snooze 5m</button>'
    +'</div>'
    +'<div id="al-list" style="text-align:left;max-height:180px;overflow-y:auto;"></div>'
    +'</div>'

    +'</div>'; /* end grid */

  ckStartLive();
  swRender();
  tmRender();
  alRender();
  alSetDefaultTime();
}

/* ══════════════════ LIVE CLOCK ══════════════════ */
var _ckLiveInt = null;
function ckStartLive() {
  clearInterval(_ckLiveInt);
  function tick() {
    var now = new Date();
    var el = document.getElementById('ck-live');
    if (!el) { clearInterval(_ckLiveInt); return; }
    el.textContent = now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
    var d = document.getElementById('ck-date');
    if (d) d.textContent = now.toLocaleDateString('en-IN', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }
  tick();
  _ckLiveInt = setInterval(tick, 1000);
}

/* ══════════════════ STOPWATCH ══════════════════ */
var _swRunning=false, _swStart=0, _swElapsed=0, _swInterval=null, _swLaps=[];

function swFmt(ms) {
  var h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000),
      s=Math.floor((ms%60000)/1000), x=ms%1000;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')
    +'<span style="font-size:22px;color:var(--text2);">.'+String(x).padStart(3,'0')+'</span>';
}

function swToggle() {
  var btn = document.getElementById('sw-btn-start');
  if (_swRunning) {
    _swElapsed += Date.now()-_swStart; _swRunning=false;
    clearInterval(_swInterval);
    if (btn){btn.textContent='▶ Resume'; btn.className='btn btn-success';}
  } else {
    _swStart = Date.now()-_swElapsed; _swRunning=true;
    _swInterval = setInterval(swTick, 30);
    if (btn){btn.textContent='⏸ Pause'; btn.className='btn btn-warning';}
  }
}

function swTick() {
  var el=document.getElementById('sw-display'); if (!el){clearInterval(_swInterval);return;}
  el.innerHTML = swFmt(_swRunning ? Date.now()-_swStart : _swElapsed);
}

function swLap() {
  if (!_swRunning && _swElapsed===0) return;
  _swLaps.push(_swRunning ? Date.now()-_swStart : _swElapsed);
  swRenderLaps();
}

function swReset() {
  clearInterval(_swInterval); _swRunning=false; _swElapsed=0; _swStart=0; _swLaps=[];
  var el=document.getElementById('sw-display'); if(el) el.innerHTML=swFmt(0);
  var btn=document.getElementById('sw-btn-start'); if(btn){btn.textContent='▶ Start';btn.className='btn btn-success';}
  swRenderLaps();
}

function swRender() {
  var el=document.getElementById('sw-display'); if(el) el.innerHTML=swFmt(_swElapsed);
  if (_swRunning) { clearInterval(_swInterval); _swInterval=setInterval(swTick,30); }
  swRenderLaps();
}

function fmtMs(ms) {
  var m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), x=Math.floor((ms%1000)/10);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(x).padStart(2,'0');
}

function swRenderLaps() {
  var el=document.getElementById('sw-laps'); if(!el) return;
  if (!_swLaps.length) { el.innerHTML=''; return; }
  var prev=0, fastest=Infinity;
  _swLaps.forEach(function(ms,i){ var sp=ms-(i>0?_swLaps[i-1]:0); if(sp<fastest)fastest=sp; });
  var html='<div style="font-size:11px;color:var(--text2);margin-bottom:4px;">Lap times ('+_swLaps.length+')</div>';
  var copy=[..._swLaps];
  copy.reverse().forEach(function(ms,ri){
    var idx=_swLaps.length-1-ri;
    var split=ms-(idx>0?_swLaps[idx-1]:0);
    var isFastest=_swLaps.length>1&&split===fastest;
    html+='<div style="display:flex;justify-content:space-between;padding:3px 6px;border-radius:6px;font-size:12px;'
      +'background:'+(isFastest?'var(--success-bg)':'var(--surface2)')+';margin-bottom:3px;">'
      +'<span style="color:var(--text2);">Lap '+(idx+1)+'</span>'
      +'<span style="font-variant-numeric:tabular-nums;">'+fmtMs(split)+'</span>'
      +'<span style="color:var(--text3);font-variant-numeric:tabular-nums;">'+fmtMs(ms)+'</span>'
      +'</div>';
  });
  el.innerHTML=html;
}

/* ══════════════════ COUNTDOWN TIMER ══════════════════ */
var _tmRunning=false, _tmTotal=0, _tmRemain=0, _tmInterval=null, _tmEndTime=0;

function tmPreview() {
  var h=+(document.getElementById('tm-h')||{value:0}).value||0;
  var m=+(document.getElementById('tm-m')||{value:0}).value||0;
  var s=+(document.getElementById('tm-s')||{value:0}).value||0;
  var el=document.getElementById('tm-display'); if(el) el.textContent=tmFmt((h*3600+m*60+s)*1000);
}

function tmFmt(ms) {
  if(ms<0)ms=0;
  var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function tmQuick(h,m,s) {
  var hi=document.getElementById('tm-h'),mi=document.getElementById('tm-m'),si=document.getElementById('tm-s');
  if(hi)hi.value=h; if(mi)mi.value=m; if(si)si.value=s;
  tmPreview(); if(_tmRunning)tmReset();
}

function tmToggle() {
  var btn=document.getElementById('tm-btn-start');
  if (_tmRunning) {
    clearInterval(_tmInterval); _tmRunning=false;
    _tmRemain=Math.max(0,_tmEndTime-Date.now());
    if(btn){btn.textContent='▶ Resume';btn.className='btn btn-success';}
  } else {
    if (_tmRemain===0) {
      var h=+(document.getElementById('tm-h')||{value:0}).value||0;
      var m=+(document.getElementById('tm-m')||{value:0}).value||0;
      var s=+(document.getElementById('tm-s')||{value:0}).value||0;
      _tmTotal=(h*3600+m*60+s)*1000;
      if(_tmTotal===0){showToast('Set a time first','error');return;}
      _tmRemain=_tmTotal;
    }
    _tmEndTime=Date.now()+_tmRemain; _tmRunning=true;
    var wrap=document.getElementById('tm-progress-wrap'); if(wrap)wrap.style.display='block';
    if(btn){btn.textContent='⏸ Pause';btn.className='btn btn-warning';}
    clearInterval(_tmInterval); _tmInterval=setInterval(tmTick,250); tmTick();
  }
}

function tmTick() {
  var rem=Math.max(0,_tmEndTime-Date.now()); _tmRemain=rem;
  var el=document.getElementById('tm-display');
  if(el){el.textContent=tmFmt(rem);el.style.color=rem<10000?'var(--danger)':rem<60000?'var(--warning)':'var(--text)';}
  var pct=_tmTotal>0?rem/_tmTotal*100:0;
  var bar=document.getElementById('tm-progress');
  if(bar){bar.style.width=pct+'%';bar.className='progress-fill '+(pct<20?'danger':pct<50?'warning':'success');}
  if(rem<=0){clearInterval(_tmInterval);_tmRunning=false;_tmRemain=0;tmFireAlert();}
}

function tmFireAlert() {
  var label=(document.getElementById('tm-label')||{value:'Timer'}).value||'Timer';
  var btn=document.getElementById('tm-btn-start');
  if(btn){btn.textContent='▶ Start';btn.className='btn btn-success';}
  var el=document.getElementById('tm-display'); if(el){el.textContent='00:00:00';el.style.color='var(--success)';}
  playBeep(880,600); playBeep(1100,600,700);
  showModal('<div class="modal modal-sm" style="text-align:center;">'
    +'<div class="modal-header" style="justify-content:center;"><div class="modal-title" style="font-size:20px;">⏰ Time\'s Up!</div></div>'
    +'<div style="font-size:40px;margin:10px 0;">🎉</div>'
    +'<div style="font-size:16px;font-weight:700;margin-bottom:8px;">'+esc(label)+'</div>'
    +'<div style="color:var(--text2);margin-bottom:16px;">Your timer has finished!</div>'
    +'<div style="display:flex;gap:8px;justify-content:center;">'
    +'<button class="btn btn-primary" onclick="closeModal();tmReset()">OK</button>'
    +'<button class="btn btn-secondary" onclick="closeModal();tmQuick(0,5,0);tmToggle()">＋ 5 min more</button>'
    +'</div></div>');
}

function tmReset() {
  clearInterval(_tmInterval); _tmRunning=false; _tmRemain=0; _tmTotal=0;
  var el=document.getElementById('tm-display'); if(el){el.textContent='00:00:00';el.style.color='var(--text)';}
  var btn=document.getElementById('tm-btn-start'); if(btn){btn.textContent='▶ Start';btn.className='btn btn-success';}
  var bar=document.getElementById('tm-progress'); if(bar)bar.style.width='100%';
  var wrap=document.getElementById('tm-progress-wrap'); if(wrap)wrap.style.display='none';
}

function tmRender() {
  var el=document.getElementById('tm-display'); if(el)el.textContent=tmFmt(_tmRemain||0);
  if(_tmRunning){clearInterval(_tmInterval);_tmInterval=setInterval(tmTick,250);}
}

/* ══════════════════ AUDIO BEEP ══════════════════ */
var _audioCtx=null;
function getAudioCtx(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();return _audioCtx;}
function playBeep(freq,dur,delay){
  freq=freq||880; dur=dur||400; delay=delay||0;
  try {
    var ctx=getAudioCtx();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value=freq; osc.type='sine';
    var t=ctx.currentTime+delay/1000;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.4,t+0.02);
    gain.gain.linearRampToValueAtTime(0,t+dur/1000);
    osc.start(t); osc.stop(t+dur/1000+0.05);
  } catch(e){}
}

/* ══════════════════ ALARM ══════════════════ */
var _alarms=[], _alCheckInt=null, _alFiring=null, _alRingTimer=null, _alRingInterval=null;
var AL_KEY='gate_alarms_v1';

function alSetDefaultTime(){
  var inp=document.getElementById('al-time'); if(!inp)return;
  var now=new Date(); now.setMinutes(now.getMinutes()+1);
  inp.value=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}

function alToggleDay(d){
  var chip=document.querySelector('.al-day-chip[data-day="'+d+'"]'); if(!chip)return;
  var active=chip.dataset.active==='1';
  chip.dataset.active=active?'':'1';
  chip.style.background=active?'var(--surface2)':'var(--primary)';
  chip.style.color=active?'var(--text2)':'#fff';
  chip.style.borderColor=active?'var(--border)':'var(--primary)';
}

function alGetDays(){
  return Array.from(document.querySelectorAll('.al-day-chip'))
    .filter(function(c){return c.dataset.active==='1';})
    .map(function(c){return +c.dataset.day;});
}

function alAdd(){
  var timeVal=(document.getElementById('al-time')||{value:''}).value;
  if(!timeVal){showToast('Set a time first','error');return;}
  var parts=timeVal.split(':'); var h=+parts[0], m=+parts[1];
  var label=(document.getElementById('al-label')||{value:'Alarm'}).value||'Alarm';
  var days=alGetDays();
  var ringDur=+(document.getElementById('al-ring-dur')||{value:7}).value||7;
  _alarms.push({id:genId(),h:h,m:m,label:label,days:days,active:true,ringDur:ringDur});
  alSave(); alRender();
  showToast('✓ Alarm set for '+timeVal);
  document.querySelectorAll('.al-day-chip').forEach(function(c){
    c.dataset.active='';c.style.background='var(--surface2)';c.style.color='var(--text2)';c.style.borderColor='var(--border)';
  });
  var lbl=document.getElementById('al-label'); if(lbl)lbl.value='';
}

function alSave(){try{localStorage.setItem(AL_KEY,JSON.stringify(_alarms));}catch(e){}}
function alLoad(){try{var d=localStorage.getItem(AL_KEY);if(d)_alarms=JSON.parse(d);}catch(e){_alarms=[];}}

function alRender(){
  var el=document.getElementById('al-list'); if(!el)return;
  if(!_alarms.length){el.innerHTML='<div class="text-muted" style="text-align:center;padding:14px;">No alarms set</div>';return;}
  var html='';
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  _alarms.forEach(function(a){
    var timeStr=String(a.h).padStart(2,'0')+':'+String(a.m).padStart(2,'0');
    var dayStr=a.days.length ? ' · '+a.days.map(function(d){return dayNames[d];}).join(', ') : ' · Once';
    var ringLabel=a.ringDur===0?'∞':((a.ringDur||7)+'s');
    var border=a.active?'var(--primary)':'var(--border)';
    html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);'
      +'border-radius:10px;margin-bottom:6px;border:1.5px solid '+border+';">'
      +'<div style="flex:1;">'
      +'<div style="font-weight:700;font-size:14px;">'+timeStr+'</div>'
      +'<div style="font-size:11px;color:var(--text2);">'+esc(a.label)+dayStr+' · 🔔'+ringLabel+'</div>'
      +'</div>'
      +'<label style="cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;">'
      +'<input type="checkbox" '+(a.active?'checked':'')+' onchange="alToggle(\''+a.id+'\',this.checked)" style="width:16px;height:16px;accent-color:var(--primary);">'
      +'<span>'+(a.active?'On':'Off')+'</span></label>'
      +'<button onclick="alDelete(\''+a.id+'\')" class="btn btn-danger btn-sm btn-icon" title="Delete">🗑</button>'
      +'</div>';
  });
  el.innerHTML=html;
}

function alToggle(id,active){var a=_alarms.find(function(x){return x.id===id;});if(a){a.active=active;alSave();alRender();}}

async function alDelete(id){
  if(!await confirmDlg('Delete this alarm?'))return;
  _alarms=_alarms.filter(function(x){return x.id!==id;});alSave();alRender();
}

function alSnooze(){
  closeModal(); _alFiring=null;
  var now=new Date(); now.setMinutes(now.getMinutes()+5);
  _alarms.push({id:genId(),h:now.getHours(),m:now.getMinutes(),label:'Snoozed 💤',days:[],active:true});
  alSave(); alRender(); showToast('💤 Snoozed for 5 minutes');
}

function alCheck(){
  var now=new Date(), day=now.getDay(), h=now.getHours(), m=now.getMinutes();
  _alarms.forEach(function(a){
    if(!a.active||a.h!==h||a.m!==m) return;
    var id=a.id+'-'+h+'-'+m;
    if(_alFiring===id) return;
    if(a.days.length&&a.days.indexOf(day)===-1) return;
    _alFiring=id;
    if(!a.days.length){a.active=false;alSave();alRender();}
    alFire(a);
  });
}

function alStopRing(){
  clearTimeout(_alRingTimer); clearInterval(_alRingInterval);
  _alRingTimer=null; _alRingInterval=null;
}
function alFire(a){
  alStopRing();
  var dur=(a.ringDur===0||a.ringDur===undefined)?7:+a.ringDur;
  /* ring pattern: beep every 1.8 sec */
  function ringOnce(){ playBeep(660,350); playBeep(880,350,450); playBeep(1100,350,900); }
  ringOnce();
  _alRingInterval=setInterval(ringOnce,1800);
  if(dur>0){
    _alRingTimer=setTimeout(function(){ alStopRing(); },dur*1000);
  }
  var timeStr=String(a.h).padStart(2,'0')+':'+String(a.m).padStart(2,'0');
  var durLabel=dur===0?'Until dismissed':dur+' sec';
  showModal('<div class="modal modal-sm" style="text-align:center;">'
    +'<div class="modal-header" style="justify-content:center;"><div class="modal-title" style="font-size:20px;">🔔 Alarm!</div></div>'
    +'<div style="font-size:48px;margin:10px 0;">⏰</div>'
    +'<div style="font-size:24px;font-weight:900;margin-bottom:6px;">'+timeStr+'</div>'
    +'<div style="font-size:16px;color:var(--text2);margin-bottom:4px;">'+esc(a.label)+'</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:16px;">🔔 Ring: '+durLabel+'</div>'
    +'<div style="display:flex;gap:8px;justify-content:center;">'
    +'<button class="btn btn-primary" onclick="alStopRing();closeModal();_alFiring=null;">✓ Dismiss</button>'
    +'<button class="btn btn-secondary" onclick="alStopRing();alSnooze()">💤 Snooze 5m</button>'
    +'</div></div>');
}

function initAlarmChecker(){
  alLoad(); clearInterval(_alCheckInt);
  _alCheckInt=setInterval(alCheck,15000); alCheck();
}


init();
</script>
